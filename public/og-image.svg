<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="CalRay: AI calorie and fitness tracker coach">
  <defs>
    <linearGradient id="bg" x1="108" y1="78" x2="1088" y2="552" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcfbf8" />
      <stop offset="0.48" stop-color="#f7f7f3" />
      <stop offset="1" stop-color="#fcfbf8" />
    </linearGradient>
    <linearGradient id="paper" x1="180" y1="140" x2="1008" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#fbfcfb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="35" flood-color="#151515" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="56" fill="url(#bg)" />
  <circle cx="208" cy="118" r="150" fill="#8fd8f0" opacity=".12" />
  <circle cx="1030" cy="104" r="164" fill="#8dd94b" opacity=".12" />
  <circle cx="944" cy="522" r="178" fill="#ffd84d" opacity=".08" />
  <circle cx="154" cy="532" r="110" fill="#f89b4c" opacity=".08" />

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="1020" height="450" rx="42" fill="#ffffff" opacity=".84" />
  </g>

  <g transform="translate(130 140)">
    <rect width="320" height="320" rx="36" fill="url(#paper)" />
    <image href="/calray-logo.jpeg" x="14" y="14" width="292" height="292" preserveAspectRatio="xMidYMid meet" />
  </g>

  <text x="486" y="214" fill="#151515" font-family="Space Grotesk, Arial, sans-serif" font-size="82" font-weight="700">
    CalRay
  </text>
  <text x="486" y="282" fill="#6b6f72" font-family="Manrope, Arial, sans-serif" font-size="32" font-weight="600">
    AI calorie and fitness tracker coach
  </text>
  <text x="486" y="344" fill="#5d6468" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="500">
    By Hitesh Kasalya
  </text>
  <text x="486" y="400" fill="#5d6468" font-family="Manrope, Arial, sans-serif" font-size="24">
    Meal scans, barcode lookup, favorites, custom foods, and workout planning.
  </text>

  <g transform="translate(486 442)">
    <rect width="176" height="46" rx="23" fill="#151515" />
    <text x="88" y="30" text-anchor="middle" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="700">
      Official site
    </text>
  </g>
</svg>
